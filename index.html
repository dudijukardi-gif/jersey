<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Jersey Membership</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; }
        header { background-color: #111; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .member-panel { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 15px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-join { background-color: #ff9800; color: white; }
        .btn-cart { background-color: #4CAF50; color: white; }
        
        main { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .status-bar { background-color: #e0f7fa; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 20px; font-weight: bold; color: #006064; }
        
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; background-color: #ccc; }
        .price-normal { text-decoration: line-through; color: #888; font-size: 14px; display: none; }
        .price-active { font-size: 20px; font-weight: bold; color: #e53935; margin: 10px 0; }
        
        .cart-section { margin-top: 40px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header>
        <div class="logo">FC Jersey Store</div>
        <div class="member-panel">
            <span id="userStatus">Status: Tamu (Reguler)</span>
            <button class="btn btn-join" id="btnToggleMember" onclick="toggleMembership()">Daftar Member Gratis</button>
        </div>
    </header>

    <main>
        <div class="status-bar" id="promoBanner">
            Daftar member sekarang untuk mendapatkan diskon 20% setiap pembelian jersey!
        </div>

        <div class="products">
            <!-- Produk 1 -->
            <div class="card">
                <!-- Placeholder gambar (bisa diganti URL asli) -->
                <img src="https://via.placeholder.com/250x200?text=Jersey+Home" alt="Jersey Home">
                <h3>Jersey Home 2026</h3>
                <div class="price-normal" id="normalPrice1">Rp 200.000</div>
                <div class="price-active" id="activePrice1">Rp 200.000</div>
                <button class="btn btn-cart" onclick="addToCart('Jersey Home 2026', 200000)">Tambah ke Keranjang</button>
            </div>

            <!-- Produk 2 -->
            <div class="card">
                <img src="https://via.placeholder.com/250x200?text=Jersey+Away" alt="Jersey Away">
                <h3>Jersey Away 2026</h3>
                <div class="price-normal" id="normalPrice2">Rp 200.000</div>
                <div class="price-active" id="activePrice2">Rp 200.000</div>
                <button class="btn btn-cart" onclick="addToCart('Jersey Away 2026', 200000)">Tambah ke Keranjang</button>
            </div>
        </div>

        <div class="cart-section">
            <h2>Keranjang Belanja</h2>
            <ul id="cartList"></ul>
            <h3>Total: <span id="cartTotal">Rp 0</span></h3>
            <button class="btn btn-join" onclick="checkout()">Checkout (Simulasi)</button>
        </div>
    </main>

    <script>
        // State Variabel
        let isMember = false;
        let cart = [];
        const discountRate = 0.20; // Diskon member 20%

        // Fungsi untuk mengubah status member
        function toggleMembership() {
            isMember = !isMember;
            const btn = document.getElementById('btnToggleMember');
            const status = document.getElementById('userStatus');
            const promo = document.getElementById('promoBanner');

            if (isMember) {
                btn.innerText = "Keluar Akun";
                btn.style.backgroundColor = "#d32f2f";
                status.innerText = "Status: VIP Member";
                promo.innerText = "Selamat datang Member! Diskon 20% telah aktif di seluruh produk.";
                promo.style.backgroundColor = "#c8e6c9";
                promo.style.color = "#2e7d32";
            } else {
                btn.innerText = "Daftar Member Gratis";
                btn.style.backgroundColor = "#ff9800";
                status.innerText = "Status: Tamu (Reguler)";
                promo.innerText = "Daftar member sekarang untuk mendapatkan diskon 20% setiap pembelian jersey!";
                promo.style.backgroundColor = "#e0f7fa";
                promo.style.color = "#006064";
            }
            updatePrices();
            updateCart(); // Refresh keranjang dengan harga baru jika ada perubahan
        }

        // Fungsi untuk memperbarui harga di layar
        function updatePrices() {
            const basePrice = 200000;
            const discountedPrice = basePrice - (basePrice * discountRate);

            for (let i = 1; i <= 2; i++) {
                const normalLabel = document.getElementById('normalPrice' + i);
                const activeLabel = document.getElementById('activePrice' + i);

                if (isMember) {
                    normalLabel.style.display = "block";
                    activeLabel.innerText = "Rp " + discountedPrice.toLocaleString('id-ID');
                } else {
                    normalLabel.style.display = "none";
                    activeLabel.innerText = "Rp " + basePrice.toLocaleString('id-ID');
                }
            }
        }

        // Fungsi tambah produk ke keranjang
        function addToCart(productName, basePrice) {
            cart.push({ name: productName, price: basePrice });
            updateCart();
            alert(productName + " berhasil ditambahkan!");
        }

        // Fungsi merender ulang isi keranjang
        function updateCart() {
            const list = document.getElementById('cartList');
            const totalDisplay = document.getElementById('cartTotal');
            
            list.innerHTML = "";
            let total = 0;

            cart.forEach((item) => {
                let finalPrice = isMember ? item.price - (item.price * discountRate) : item.price;
                total += finalPrice;
                
                let li = document.createElement('li');
                li.innerText = `${item.name} - Rp ${finalPrice.toLocaleString('id-ID')}`;
                list.appendChild(li);
            });

            totalDisplay.innerText = "Rp " + total.toLocaleString('id-ID');
        }

        // Fungsi Checkout simulasi
        function checkout() {
            if (cart.length === 0) {
                alert("Keranjang masih kosong!");
                return;
            }
            alert("Pesanan berhasil dibuat! Anda akan diarahkan ke WhatsApp untuk pembayaran.");
            cart = []; // Kosongkan keranjang
            updateCart();
        }
    </script>
</body>
</html>
